<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimador de Expedición · PRO v5</title>

<style>
*{box-sizing:border-box;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#001f4d,#00a8e1);
  color:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  padding:26px 24px;
  border-radius:22px;
  max-width:480px;
  width:100%;
  box-shadow:0 25px 55px rgba(0,0,0,.5);
}
.logo{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:18px;
}
.logo span{color:#00e6ff;}
label{display:block;margin-top:14px;font-size:14px;}
input[type='date'],select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:8px;
  font-size:14px;
  background:#fff;
  color:#002e6d;
}
button{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:none;
  margin-top:14px;
  font-size:15px;
  font-weight:700;
  background:linear-gradient(135deg,#00e6ff,#00ffcc);
  color:#00324d;
}
button.sec{background:rgba(255,255,255,.15);color:#fff;}
.result{
  margin-top:18px;
  background:rgba(255,255,255,.12);
  padding:16px;
  border-radius:16px;
  font-size:14px;
  line-height:1.7;
}
.hit{
  background:rgba(0,255,200,.25);
  border-radius:10px;
  padding:4px 6px;
}
hr{margin:18px 0;opacity:.25;}
small{
  display:block;
  margin-top:12px;
  font-size:11px;
  opacity:.7;
  text-align:center;
}
</style>
</head>

<body>
<div class="card">
  <div class="logo">Movistar <span>Apoyo Interno · PRO v5</span></div>

  <label>Fecha de nacimiento</label>
  <input type="date" id="birth">

  <label>¿Qué tan cerca fue la expedición?</label>
  <select id="rango">
    <option value="cerca">Cerca de los 18</option>
    <option value="normal" selected>Meses después</option>
    <option value="lejos">Mucho después</option>
  </select>

  <button onclick="calcular()">Calcular estimación</button>

  <div class="result" id="resultado"></div>

  <hr>

  <label>📌 Fecha real de expedición</label>
  <input type="date" id="real">

  <button onclick="aprender()">🧠 Guardar aprendizaje</button>
  <button class="sec" onclick="limpiar()">🧹 Limpiar estadísticas</button>

  <small>Uso interno · Estimación orientativa</small>
</div>

<script>
let ultimoBase=null;
let fechasGeneradas=[];
let ajustes=JSON.parse(localStorage.getItem("ajustesPorRango"))||{cerca:0,normal:0,lejos:0};

function calcular(){
  const b=document.getElementById("birth").value;
  if(!b) return alert("Ingresa la fecha de nacimiento");

  const rango=document.getElementById("rango").value;
  let baseDelay=rango==="cerca"?1:rango==="normal"?4:9;
  let delay=baseDelay+(ajustes[rango]||0);
  delay=Math.max(-2,Math.min(delay,20));

  const base=new Date(b);
  base.setFullYear(base.getFullYear()+18);
  base.setMonth(base.getMonth()+delay);
  base.setDate(10);
  ultimoBase=base;

  const offsets=[-2,-1,0,1,2];
  fechasGeneradas=offsets.map(o=>{
    const d=new Date(base);
    d.setMonth(d.getMonth()+o);
    return d;
  });

  renderResultados();
}

function renderResultados(matchIndex=null){
  let html="";
  fechasGeneradas.forEach((d,i)=>{
    const cls = i===matchIndex ? "hit" : "";
    html+=`<div class="${cls}">• ${d.toLocaleDateString()}</div>`;
  });
  document.getElementById("resultado").innerHTML=html;
}

function aprender(){
  if(!ultimoBase) return alert("Primero calcula una fecha");
  const realVal=document.getElementById("real").value;
  if(!realVal) return alert("Ingresa la fecha real");

  const rango=document.getElementById("rango").value;
  const real=new Date(realVal);

  let matchIndex=null;
  fechasGeneradas.forEach((d,i)=>{
    if(d.getMonth()===real.getMonth() && d.getFullYear()===real.getFullYear()){
      matchIndex=i;
    }
  });

  renderResultados(matchIndex);

  const diff=Math.round((real-ultimoBase)/(1000*60*60*24*30));
  ajustes[rango]=(ajustes[rango]||0)+diff*0.25;
  ajustes[rango]=Math.max(-8,Math.min(8,ajustes[rango]));
  localStorage.setItem("ajustesPorRango",JSON.stringify(ajustes));

  alert(matchIndex!==null 
    ? "Coincidencia detectada ✔️ Aprendizaje guardado"
    : "No coincidió exacto, aprendizaje guardado");

  document.getElementById("real").value="";
}

function limpiar(){
  if(!confirm("¿Seguro que deseas borrar todo el aprendizaje?")) return;
  localStorage.removeItem("ajustesPorRango");
  ajustes={cerca:0,normal:0,lejos:0};
  alert("Estadísticas limpiadas");
}
</script>
</body>
</html>
