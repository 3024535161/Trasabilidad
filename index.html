<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimador de Expedición · PRO v2</title>

<style>
*{box-sizing:border-box;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#001f4d,#00a8e1);
  color:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  padding:26px 24px;
  border-radius:22px;
  max-width:460px;
  width:100%;
  box-shadow:0 25px 55px rgba(0,0,0,.5);
}
.logo{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:18px;
}
.logo span{color:#00e6ff;}
label{
  display:block;
  margin-top:14px;
  font-size:14px;
}
input[type='date'], select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:8px;
  font-size:14px;
  background:#ffffff;
  color:#002e6d;
}
button{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:none;
  margin-top:14px;
  font-size:15px;
  font-weight:700;
  background:linear-gradient(135deg,#00e6ff,#00ffcc);
  color:#00324d;
  cursor:pointer;
}
button.sec{
  background:rgba(255,255,255,.15);
  color:#fff;
}
.result{
  margin-top:18px;
  background:rgba(255,255,255,.12);
  padding:16px;
  border-radius:16px;
  font-size:14px;
}
.tag{
  font-size:12px;
  padding:4px 9px;
  border-radius:10px;
  margin-left:6px;
}
.alta{background:#00ffcc;color:#003;}
.media{background:#ffd966;color:#333;}
.baja{background:#ff9f9f;color:#400;}
.confianza{
  margin-top:10px;
  font-size:13px;
}
hr{margin:18px 0;opacity:.25;}
small{
  display:block;
  margin-top:12px;
  font-size:11px;
  opacity:.7;
  text-align:center;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.modalContent{
  background:#0b2a4a;
  width:92%;
  max-width:440px;
  max-height:80vh;
  overflow:auto;
  border-radius:18px;
  padding:18px;
}
.entry{
  background:rgba(255,255,255,.1);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:13px;
}
</style>
</head>

<body>
<div class="card">
  <div class="logo">Movistar <span>Apoyo Interno · PRO v2</span></div>

  <label>Fecha de nacimiento</label>
  <input type="date" id="birth">

  <label>¿Qué tan cerca fue la expedición?</label>
  <select id="rango">
    <option value="cerca">Cerca de los 18</option>
    <option value="normal" selected>Meses después</option>
    <option value="lejos">Mucho después</option>
  </select>

  <button onclick="calcular()">Calcular estimación</button>

  <div class="result" id="resultado"></div>
  <div class="confianza" id="confianza"></div>

  <hr>

  <label>📌 Fecha real de expedición</label>
  <input type="date" id="real">

  <button onclick="aprender()">🧠 Guardar aprendizaje</button>
  <button class="sec" onclick="verStats()">📊 Estadísticas</button>

  <small>Uso interno · Estimación orientativa</small>
</div>

<div class="modal" id="modal">
  <div class="modalContent">
    <h3>📊 Estadísticas por categoría</h3>
    <div id="resumen"></div>
    <hr>
    <div id="lista"></div>
    <button class="sec" onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script>
let ultimoBase=null;

// Ajustes por categoría
let ajustes = JSON.parse(localStorage.getItem("ajustesPorRango")) || {
  cerca:0,
  normal:0,
  lejos:0
};

let historial = JSON.parse(localStorage.getItem("historialExpedicion")) || [];

function nivelConfianza(rango){
  const total = historial.filter(h=>h.rango===rango).length;
  if(total<3) return "Baja";
  if(total<8) return "Media";
  return "Alta";
}

function calcular(){
  const b=document.getElementById("birth").value;
  if(!b) return alert("Ingresa la fecha de nacimiento");

  const rango=document.getElementById("rango").value;

  let baseDelay = rango==="cerca"?1:rango==="normal"?4:9;
  let delay = baseDelay + (ajustes[rango] || 0);
  delay=Math.max(-1,Math.min(delay,18));

  const base=new Date(b);
  base.setFullYear(base.getFullYear()+18);
  base.setMonth(base.getMonth()+delay);
  base.setDate(10);
  ultimoBase=base;

  const a=new Date(base);
  const m=new Date(base);m.setMonth(m.getMonth()+1);
  const bja=new Date(base);bja.setMonth(bja.getMonth()-1);

  document.getElementById("resultado").innerHTML=`
    🟢 <b>${a.toLocaleDateString()}</b> <span class="tag alta">Alta</span><br>
    🟡 ${m.toLocaleDateString()} <span class="tag media">Media</span><br>
    🔴 ${bja.toLocaleDateString()} <span class="tag baja">Baja</span>
  `;

  document.getElementById("confianza").innerHTML =
    "Confianza ("+rango+"): <b>"+nivelConfianza(rango)+"</b>";
}

function aprender(){
  if(!ultimoBase) return alert("Primero calcula una fecha");

  const real=document.getElementById("real").value;
  if(!real) return alert("Ingresa la fecha real");

  const rango=document.getElementById("rango").value;
  const realDate=new Date(real);
  const diff=Math.round((realDate-ultimoBase)/(1000*60*60*24*30));

  // aprendizaje SOLO dentro del rango usado
  ajustes[rango] = (ajustes[rango] || 0) + diff*0.25;
  ajustes[rango] = Math.max(-6,Math.min(6,ajustes[rango]));

  localStorage.setItem("ajustesPorRango",JSON.stringify(ajustes));

  historial.push({
    rango:rango,
    estimada:ultimoBase.toLocaleDateString(),
    real:realDate.toLocaleDateString(),
    diff:diff
  });
  localStorage.setItem("historialExpedicion",JSON.stringify(historial));

  alert("Aprendizaje guardado en '"+rango+"' 🧠");
  document.getElementById("real").value="";
}

function verStats(){
  const lista=document.getElementById("lista");
  const resumen=document.getElementById("resumen");
  lista.innerHTML="";

  resumen.innerHTML=`
    <b>Cerca:</b> ${nivelConfianza("cerca")} | Ajuste ${ajustes.cerca.toFixed(1)} meses<br>
    <b>Normal:</b> ${nivelConfianza("normal")} | Ajuste ${ajustes.normal.toFixed(1)} meses<br>
    <b>Lejos:</b> ${nivelConfianza("lejos")} | Ajuste ${ajustes.lejos.toFixed(1)} meses
  `;

  historial.slice().reverse().forEach(h=>{
    lista.innerHTML+=`
      <div class="entry">
        <b>Rango:</b> ${h.rango}<br>
        <b>Estimada:</b> ${h.estimada}<br>
        <b>Real:</b> ${h.real}<br>
        <b>Diferencia:</b> ${h.diff} meses
      </div>`;
  });

  document.getElementById("modal").style.display="flex";
}

function cerrar(){
  document.getElementById("modal").style.display="none";
}
</script>
</body>
</html>
