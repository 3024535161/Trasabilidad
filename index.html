<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimador Expedición · Apoyo Interno</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#002e6d,#00a8e1);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:rgba(0,0,0,.35);
  padding:24px;
  border-radius:18px;
  max-width:440px;
  width:100%;
}
.logo{
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
.logo span{color:#00e6ff;}
label{
  display:block;
  margin-top:10px;
  font-size:14px;
}
input,select,button{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  margin-top:6px;
  font-size:14px;
}
button{
  background:#00e6ff;
  color:#002e6d;
  font-weight:bold;
  margin-top:14px;
  cursor:pointer;
}
.result{
  margin-top:14px;
  background:rgba(255,255,255,.1);
  padding:14px;
  border-radius:14px;
  font-size:14px;
}
.tag{
  font-size:12px;
  padding:3px 8px;
  border-radius:8px;
  margin-left:6px;
}
.alta{background:#00ffcc;color:#003;}
.media{background:#ffd966;color:#333;}
.baja{background:#ff9999;color:#400;}

.info{
  margin-top:12px;
  background:rgba(0,0,0,.25);
  padding:12px;
  border-radius:12px;
  font-size:12.5px;
  line-height:1.4;
  opacity:.9;
}

small{
  opacity:.65;
  font-size:11px;
  display:block;
  margin-top:8px;
}
hr{
  margin:14px 0;
  opacity:.25;
}
</style>
</head>

<body>
<div class="card">
  <div class="logo">Movistar <span>Apoyo Interno</span></div>

  <label>Fecha de nacimiento</label>
  <input type="date" id="birth">

  <label>¿Cuándo expidió la cédula?</label>
  <select id="tiempo">
    <option value="justo">Apenas cumplí 18</option>
    <option value="meses" selected>A los meses</option>
    <option value="mucho">Mucho después</option>
  </select>

  <label>¿Fue antes o después del cumpleaños?</label>
  <select id="direccion">
    <option value="nr" selected>No recuerda</option>
    <option value="despues">Después</option>
    <option value="antes">Antes</option>
  </select>

  <label>¿Fue el mismo año que cumplió 18?</label>
  <select id="mismoAno">
    <option value="nr" selected>No recuerda</option>
    <option value="si">Sí</option>
    <option value="no">No</option>
  </select>

  <button onclick="calcular()">Calcular</button>

  <div class="result" id="resultado"></div>

  <!-- APRENDIZAJE -->
  <hr>

  <label>📌 Fecha real de expedición (si la encuentras)</label>
  <input type="date" id="real">

  <button onclick="aprender()">🧠 Guardar y aprender</button>

  <div class="info">
    <ul>
      <li>Mejora automáticamente con el uso semanal</li>
      <li>Se adapta al comportamiento real de tus clientes</li>
      <li>Aprende de tus patrones operativos</li>
      <li>Funciona de forma independiente</li>
    </ul>
  </div>

  <small>Uso interno. Estimación orientativa sin consulta oficial.</small>
</div>

<script>
let ultimoBase = null;

// Cargar aprendizaje previo (desfase promedio en meses)
let ajusteGlobal = Number(localStorage.getItem("ajusteExpedicionMeses")) || 0;

function calcular(){
  const b=document.getElementById("birth").value;
  if(!b) return;

  const birth=new Date(b);
  const tiempo=document.getElementById("tiempo").value;
  const direccion=document.getElementById("direccion").value;
  const mismoAno=document.getElementById("mismoAno").value;

  let delay=4; // base estable

  if(tiempo==="justo") delay-=2;
  if(tiempo==="mucho") delay+=6;

  if(direccion==="despues") delay+=1;
  if(direccion==="antes") delay-=1;

  if(mismoAno==="si") delay-=1;
  if(mismoAno==="no") delay+=6;

  // Aplicar aprendizaje (MUY SUAVE)
  delay += ajusteGlobal;

  delay=Math.max(-2,Math.min(delay,18));

  const base=new Date(birth);
  base.setFullYear(base.getFullYear()+18);
  base.setMonth(base.getMonth()+delay);
  base.setDate(10);

  ultimoBase = base;

  const alta=new Date(base);
  const media=new Date(base); media.setMonth(media.getMonth()+1);
  const baja=new Date(base); baja.setMonth(baja.getMonth()-1);

  document.getElementById("resultado").innerHTML=`
🟢 <b>${alta.toLocaleDateString()}</b>
<span class="tag alta">Alta</span><br>
🟡 ${media.toLocaleDateString()}
<span class="tag media">Media</span><br>
🔴 ${baja.toLocaleDateString()}
<span class="tag baja">Baja</span>
`;
}

function aprender(){
  if(!ultimoBase){
    alert("Primero calcula una fecha.");
    return;
  }

  const realVal=document.getElementById("real").value;
  if(!realVal){
    alert("Ingresa la fecha real.");
    return;
  }

  const realDate=new Date(realVal);

  // Diferencia en meses (aprox)
  const diffMeses = Math.round(
    (realDate - ultimoBase) / (1000*60*60*24*30)
  );

  // Aprendizaje suave (20%)
  ajusteGlobal = ajusteGlobal + diffMeses * 0.2;

  // Limitar para no descontrolar
  ajusteGlobal = Math.max(-6, Math.min(6, ajusteGlobal));

  localStorage.setItem("ajusteExpedicionMeses", ajusteGlobal.toFixed(2));

  alert(
    "Aprendizaje guardado 🧠\n" +
    "Ajuste actual: " + ajusteGlobal.toFixed(1) + " meses"
  );

  document.getElementById("real").value="";
}
</script>
</body>
</html>
